<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سوق توتيل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #6d4c41; }
        h2 { color: #333; }
        button { background: #6d4c41; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; margin-top: 20px; }
        #msg { margin-top: 20px; font-weight: bold; color: #d32f2f; font-size: 14px; word-wrap: break-word; max-width: 300px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>
    <h1>سوق توتيل 🛒</h1>
    <div class="card">
        <h2>توب هزاز سويسري</h2>
        <h2 style="color: #8d6e63;">π 1.5</h2>
        <button onclick="startPiPayment()">شراء بالـ Pi</button>
        <p id="msg"></p>
    </div>

    <script>
        const API_KEY = "Kkdorsxjbvpcboqkhsrldyhg2noabquonjxkpdjzyl0ymipglf1d3niymdycukyb";

        function startPiPayment() {
            var msg = document.getElementById('msg');
            msg.style.color = "blue";
            msg.innerText = "جاري الاتصال بالشبكة...";

            Pi.init({ version: "2.0", sandbox: true });

            Pi.authenticate(['payments'], function(payment) {
                console.log("دفعة معلقة", payment);
            }).then(function(auth) {
                msg.style.color = "green";
                msg.innerText = "تم الربط! جاري فتح الدفع...";
                
                Pi.createPayment({
                    amount: 1.5,
                    memo: "شراء توب هزاز سويسري",
                    metadata: { item: "top" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        msg.style.color = "blue";
                        msg.innerText = "جاري إرسال الموافقة... عاين هنا!";
                        
                        const approveUrl = "https://api.minepi.com/v2/payments/" + paymentId + "/approve";
                        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(approveUrl);

                        // إرسال الموافقة مع تشفير الرابط وحزمة بيانات فاضية
                        fetch(proxyUrl, {
                            method: "POST",
                            headers: { 
                                "Authorization": "Key " + API_KEY,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({}) // مهمة جداً لشبكة Pi
                        })
                        .then(response => response.json())
                        .then(data => {
                            if(data.error) {
                                msg.style.color = "red";
                                msg.innerText = "رفض السيرفر: " + data.error.message;
                            } else {
                                msg.style.color = "green";
                                msg.innerText = "تمت الموافقة من السيرفر! كمل الدفع واضغط إرسال.";
                            }
                        })
                        .catch(err => {
                            msg.style.color = "red";
                            msg.innerText = "فشل البروكسي: " + err.message;
                        });
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        msg.innerText = "جاري تأكيد الدفع النهائي...";
                        
                        const completeUrl = "https://api.minepi.com/v2/payments/" + paymentId + "/complete";
                        const proxyUrl2 = "https://corsproxy.io/?" + encodeURIComponent(completeUrl);

                        fetch(proxyUrl2, {
                            method: "POST",
                            headers: { 
                                "Authorization": "Key " + API_KEY,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({ txid: txid })
                        })
                        .then(response => response.json())
                        .then(data => {
                            if(data.error) {
                                msg.style.color = "red";
                                msg.innerText = "خطأ في التأكيد: " + data.error.message;
                            } else {
                                msg.style.color = "green";
                                msg.innerText = "ألف مبروك! تمت العملية بنجاح 100%.";
                            }
                        })
                        .catch(err => {
                            msg.style.color = "red";
                            msg.innerText = "خطأ في الاتصال: " + err.message;
                        });
                    },
                    onCancel: function(paymentId) { msg.style.color = "orange"; msg.innerText = "تم إلغاء الدفع."; },
                    onError: function(error, payment) { msg.style.color = "red"; msg.innerText = "خطأ من المحفظة."; }
                });
            }).catch(function(error) {
                msg.style.color = "red";
                msg.innerText = "مشكلة في المصادقة، حدّث الصفحة.";
            });
        }
    </script>
</body>
</html>
